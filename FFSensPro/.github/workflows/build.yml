name: Build APK

on:
  push:
    branches: [ main, principal ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Give permission
        run: chmod +x FFSensPro/gradlew
      - name: Build APK
        run: cd FFSensPro && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: FFSensPro-debug
          path: FFSensPro/app/build/outputs/apk/debug/app-debug.apk
